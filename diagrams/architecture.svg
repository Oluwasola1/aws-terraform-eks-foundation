<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1F3864">AWS Terraform + EKS Foundation — Architecture</text>

  <!-- Internet -->
  <circle cx="450" cy="80" r="26" fill="#E8EEF7" stroke="#1F3864" stroke-width="2"/>
  <text x="450" y="85" text-anchor="middle" font-size="13" fill="#1F3864">Internet</text>
  <line x1="450" y1="106" x2="450" y2="132" stroke="#1F3864" stroke-width="2"/>

  <!-- VPC boundary -->
  <rect x="60" y="132" width="780" height="380" rx="10" fill="none" stroke="#1F3864" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="80" y="154" font-size="14" font-weight="700" fill="#1F3864">VPC (10.0.0.0/16)</text>

  <!-- Internet Gateway -->
  <rect x="390" y="140" width="120" height="36" rx="4" fill="#1F3864"/>
  <text x="450" y="163" text-anchor="middle" font-size="12" fill="#ffffff">Internet Gateway</text>

  <!-- AZ1 -->
  <rect x="90" y="200" width="330" height="290" rx="8" fill="#F5F7FB" stroke="#8FA5C7" stroke-width="1.5"/>
  <text x="105" y="222" font-size="13" font-weight="700" fill="#333333">Availability Zone A</text>

  <!-- AZ1 public subnet -->
  <rect x="110" y="236" width="290" height="80" rx="6" fill="#DCE6F5" stroke="#1F3864"/>
  <text x="125" y="254" font-size="12" font-weight="700" fill="#1F3864">Public Subnet (10.0.101.0/24)</text>
  <rect x="125" y="264" width="110" height="34" rx="4" fill="#ffffff" stroke="#1F3864"/>
  <text x="180" y="285" text-anchor="middle" font-size="11" fill="#1F3864">NAT Gateway</text>
  <rect x="255" y="264" width="130" height="34" rx="4" fill="#ffffff" stroke="#1F3864"/>
  <text x="320" y="285" text-anchor="middle" font-size="11" fill="#1F3864">LoadBalancer (ELB)</text>

  <!-- AZ1 private subnet -->
  <rect x="110" y="332" width="290" height="140" rx="6" fill="#E9F2E9" stroke="#3C7A3C"/>
  <text x="125" y="352" font-size="12" font-weight="700" fill="#2E5E2E">Private Subnet (10.0.1.0/24)</text>
  <rect x="125" y="364" width="260" height="50" rx="4" fill="#ffffff" stroke="#3C7A3C"/>
  <text x="255" y="385" text-anchor="middle" font-size="11" fill="#2E5E2E">EKS Managed Node Group</text>
  <text x="255" y="400" text-anchor="middle" font-size="10" fill="#2E5E2E">(EC2 worker nodes)</text>
  <rect x="140" y="426" width="90" height="30" rx="4" fill="#DDEEDD" stroke="#3C7A3C"/>
  <text x="185" y="446" text-anchor="middle" font-size="10" fill="#2E5E2E">Pod</text>
  <rect x="240" y="426" width="90" height="30" rx="4" fill="#DDEEDD" stroke="#3C7A3C"/>
  <text x="285" y="446" text-anchor="middle" font-size="10" fill="#2E5E2E">Pod</text>

  <!-- AZ2 -->
  <rect x="480" y="200" width="330" height="290" rx="8" fill="#F5F7FB" stroke="#8FA5C7" stroke-width="1.5"/>
  <text x="495" y="222" font-size="13" font-weight="700" fill="#333333">Availability Zone B</text>

  <!-- AZ2 public subnet -->
  <rect x="500" y="236" width="290" height="80" rx="6" fill="#DCE6F5" stroke="#1F3864"/>
  <text x="515" y="254" font-size="12" font-weight="700" fill="#1F3864">Public Subnet (10.0.102.0/24)</text>
  <rect x="515" y="264" width="260" height="34" rx="4" fill="#ffffff" stroke="#1F3864"/>
  <text x="645" y="285" text-anchor="middle" font-size="11" fill="#1F3864">(reserved for ELB / future NAT)</text>

  <!-- AZ2 private subnet -->
  <rect x="500" y="332" width="290" height="140" rx="6" fill="#E9F2E9" stroke="#3C7A3C"/>
  <text x="515" y="352" font-size="12" font-weight="700" fill="#2E5E2E">Private Subnet (10.0.2.0/24)</text>
  <rect x="515" y="364" width="260" height="50" rx="4" fill="#ffffff" stroke="#3C7A3C"/>
  <text x="645" y="385" text-anchor="middle" font-size="11" fill="#2E5E2E">EKS Managed Node Group</text>
  <text x="645" y="400" text-anchor="middle" font-size="10" fill="#2E5E2E">(EC2 worker nodes)</text>
  <rect x="530" y="426" width="90" height="30" rx="4" fill="#DDEEDD" stroke="#3C7A3C"/>
  <text x="575" y="446" text-anchor="middle" font-size="10" fill="#2E5E2E">Pod</text>
  <rect x="630" y="426" width="90" height="30" rx="4" fill="#DDEEDD" stroke="#3C7A3C"/>
  <text x="675" y="446" text-anchor="middle" font-size="10" fill="#2E5E2E">Pod</text>

  <!-- EKS control plane note -->
  <rect x="330" y="500" width="240" height="34" rx="6" fill="#1F3864"/>
  <text x="450" y="522" text-anchor="middle" font-size="12" fill="#ffffff">EKS Control Plane (AWS-managed)</text>

  <!-- connecting lines -->
  <line x1="235" y1="298" x2="255" y2="332" stroke="#1F3864" stroke-width="1.5"/>
  <line x1="625" y1="298" x2="645" y2="332" stroke="#1F3864" stroke-width="1.5"/>
</svg>
